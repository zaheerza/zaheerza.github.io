<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INSIGHTMENT — Explore</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #070d18;
      overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }
    canvas { display: block; position: fixed; inset: 0; }

    .ui-back {
      position: fixed; top: 1.25rem; left: 1.5rem; z-index: 10;
      color: #2d4a6e; font-size: .72rem; font-weight: 600;
      letter-spacing: .07em; text-transform: uppercase;
      text-decoration: none; transition: color .2s;
    }
    .ui-back:hover { color: #5a80aa; }

    .ui-tag {
      position: fixed; top: 1.25rem; right: 1.5rem;
      color: #1a2d45; font-size: .65rem; letter-spacing: .12em;
      text-transform: uppercase; pointer-events: none;
    }

    .ui-hint {
      position: fixed; bottom: 1.5rem; width: 100%; text-align: center;
      color: #1a2d45; font-size: .65rem; letter-spacing: .1em;
      text-transform: uppercase; pointer-events: none;
      transition: opacity .4s;
    }

    #node-info {
      position: fixed; bottom: 3.5rem; left: 50%; transform: translateX(-50%);
      color: #4a7aaa; font-size: .78rem; letter-spacing: .03em;
      pointer-events: none; white-space: nowrap;
      opacity: 0; transition: opacity .25s;
      max-width: 80vw; text-align: center; overflow: hidden;
      text-overflow: ellipsis;
    }
    #node-info.visible { opacity: 1; }
  </style>
</head>
<body>

<a href="./index.html" class="ui-back">← Insightment</a>
<div class="ui-tag">Graph View — Experimental</div>
<div class="ui-hint">Click to explore &nbsp;·&nbsp; Click active node to open</div>
<div id="node-info"></div>
<canvas id="c"></canvas>

<script>
(() => {
  'use strict';

  // ── DATA ────────────────────────────────────────────────────────────────────

  const NODES = [
    { id: 'home',           label: 'INSIGHTMENT',                  type: 'hub', url: './index.html' },
    { id: 'salesforce',     label: 'Salesforce',                   type: 'cat' },
    { id: 'strategy',       label: 'Strategy',                     type: 'cat' },
    { id: 'analytics',      label: 'Analytics',                    type: 'cat' },
    { id: 'ai',             label: 'AI & Tech',                    type: 'cat' },
    { id: 'howto',          label: 'How-To Guides',                type: 'sub' },
    { id: 'implementation', label: 'Implementation',               type: 'sub' },
    { id: 'ownership',      label: 'Product Ownership',            type: 'sub' },
    { id: 'reports',        label: 'Reports & Dashboards',         type: 'sub' },
    { id: 'formulas',       label: 'Report Formulas',              type: 'sub' },
    { id: 'crm',            label: 'CRM Strategy',                 type: 'sub' },
    { id: 'change',         label: 'Change Management',            type: 'sub' },
    { id: 'vendors',        label: 'Vendors',                      type: 'sub' },
    { id: 'sales-a',        label: 'Sales Analytics',              type: 'sub' },
    { id: 'p-ui',           label: 'Liberating the UI from the Database', type: 'post', url: './posts/liberating-the-ui-from-the-database.html' },
    { id: 'p-pipe',         label: 'Identifying Sales Pipeline Leakages', type: 'post', url: './posts/identifying-sales-pipeline-leakages.html' },
    { id: 'p-bigdata',      label: 'Big Data and Artificial Intelligence', type: 'post', url: './posts/big-data-and-artificial-intelligence.html' },
    { id: 'p-pval',         label: 'PARENTGROUPVAL & PREVGROUPVAL', type: 'post', url: './posts/parentgroupval-vs-prevgroupval.html' },
    { id: 'p-dosdonts',     label: "Do's and Don'ts of Product Ownership", type: 'post', url: './posts/the-dos-and-donts-of-salesforce-product-ownership.html' },
    { id: 'p-patterns',     label: 'Detecting Patterns',           type: 'post', url: './posts/detecting-patterns.html' },
    { id: 'p-crm',          label: 'A New CRM Interface',          type: 'post', url: './posts/a-new-crm-interface.html' },
  ];

  const EDGES = [
    ['home', 'salesforce'], ['home', 'strategy'], ['home', 'analytics'], ['home', 'ai'],
    ['salesforce', 'howto'], ['salesforce', 'implementation'], ['salesforce', 'ownership'],
    ['salesforce', 'reports'], ['salesforce', 'formulas'],
    ['strategy', 'crm'], ['strategy', 'change'], ['strategy', 'vendors'],
    ['analytics', 'sales-a'], ['analytics', 'reports'],
    ['ai', 'p-ui'], ['ai', 'p-bigdata'], ['ai', 'p-patterns'],
    ['sales-a', 'p-pipe'],
    ['howto', 'p-pval'], ['formulas', 'p-pval'],
    ['reports', 'p-pval'],
    ['ownership', 'p-dosdonts'], ['crm', 'p-dosdonts'],
    ['implementation', 'p-crm'],
  ];

  // ── CANVAS SETUP ────────────────────────────────────────────────────────────

  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  let W = 0, H = 0;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', () => { resize(); doLayout(activeId); });

  // ── GRAPH ───────────────────────────────────────────────────────────────────

  const adj = {};
  const NM  = {};

  NODES.forEach(n => {
    adj[n.id] = [];
    NM[n.id]  = { ...n, x: W / 2, y: H / 2, tx: W / 2, ty: H / 2, a: 0, ta: 0 };
  });
  EDGES.forEach(([a, b]) => { adj[a].push(b); adj[b].push(a); });

  // BFS depths from 'home'
  const dep = {};
  { const q = ['home']; dep['home'] = 0;
    while (q.length) {
      const c = q.shift();
      adj[c].forEach(nb => { if (dep[nb] == null) { dep[nb] = dep[c] + 1; q.push(nb); } });
    }
  }

  // ── LAYOUT ──────────────────────────────────────────────────────────────────

  let activeId = 'home';

  function doLayout(id) {
    const cx = W / 2, cy = H / 2;
    const d  = dep[id];

    const parents  = adj[id].filter(nb => dep[nb] < d);
    const children = adj[id].filter(nb => dep[nb] > d);

    // Siblings: nodes at same depth sharing a common parent
    const sibSet = new Set();
    parents.forEach(p => adj[p].forEach(nb => { if (nb !== id && dep[nb] === d) sibSet.add(nb); }));
    const sibs = [...sibSet].slice(0, 10);

    const visible = new Set([id, ...parents, ...children, ...sibs]);

    const S  = Math.min(W, H);
    const pR = S * 0.26;
    const cR = S * 0.27;
    const sX = Math.min(W * 0.4, 320);

    // Active node: centre
    place(id, cx, cy, 1);

    // Parents: gentle arc above
    arcPlace(parents, cx, cy, pR, -Math.PI / 2, 0.65);

    // Children: gentle arc below
    arcPlace(children, cx, cy, cR, Math.PI / 2, 0.72);

    // Siblings: split left / right
    const left  = sibs.filter((_, i) => i % 2 === 0);
    const right = sibs.filter((_, i) => i % 2 !== 0);
    sidePlace(left,  cx - sX, cy);
    sidePlace(right, cx + sX, cy);

    // Hide all non-visible nodes (fade them to centre so they bloom back nicely)
    NODES.forEach(({ id: nid }) => {
      if (!visible.has(nid)) {
        const n = NM[nid];
        n.tx = cx;
        n.ty = cy;
        n.ta = 0;
      }
    });
  }

  function place(id, x, y, a) {
    const n = NM[id]; n.tx = x; n.ty = y; n.ta = a;
  }

  function arcPlace(ids, cx, cy, r, base, spread) {
    const count = ids.length;
    ids.forEach((id, i) => {
      const off = count > 1 ? (i / (count - 1) - 0.5) * spread * Math.PI : 0;
      place(id, cx + Math.cos(base + off) * r, cy + Math.sin(base + off) * r, 1);
    });
  }

  function sidePlace(ids, x, cy) {
    const gap = 68, total = (ids.length - 1) * gap;
    ids.forEach((id, i) => place(id, x, cy - total / 2 + i * gap, 1));
  }

  // ── ANIMATION ───────────────────────────────────────────────────────────────

  let pulse = 0, hoverId = null;

  function update() {
    pulse += 0.033;
    NODES.forEach(({ id }) => {
      const n = NM[id];
      n.x += (n.tx - n.x) * 0.1;
      n.y += (n.ty - n.y) * 0.1;
      n.a += (n.ta - n.a) * 0.13;
    });
  }

  // ── NODE GEOMETRY ───────────────────────────────────────────────────────────

  const BASE_R = { hub: 38, cat: 27, sub: 19, post: 13 };

  function nodeR(n) {
    const b = BASE_R[n.type] || 16;
    return n.id === activeId ? b + 6 : n.id === hoverId ? b + 2 : b;
  }

  // ── DRAW ────────────────────────────────────────────────────────────────────

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background — dark with very subtle centre warmth
    const bg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
    bg.addColorStop(0, '#0d1828');
    bg.addColorStop(1, '#070d18');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Faint horizon line dividing parent / child zones
    ctx.save();
    ctx.strokeStyle = 'rgba(12, 40, 85, 0.45)';
    ctx.lineWidth = 1;
    ctx.setLineDash([2, 12]);
    ctx.beginPath();
    ctx.moveTo(W * 0.08, H / 2);
    ctx.lineTo(W * 0.92, H / 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Zone micro-labels
    const d = dep[activeId];
    const hasParents  = adj[activeId].some(nb => dep[nb] < d);
    const hasChildren = adj[activeId].some(nb => dep[nb] > d);
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = '9px Inter, system-ui, sans-serif';
    ctx.fillStyle = 'rgba(18, 50, 100, 0.55)';
    if (hasParents)  ctx.fillText('PARENT', W / 2, H / 2 - 10);
    if (hasChildren) ctx.fillText('CHILDREN', W / 2, H / 2 + 18);
    ctx.restore();

    drawEdges();
    drawNodes();
  }

  function drawEdges() {
    const an = NM[activeId];
    const d  = dep[activeId];

    adj[activeId].forEach(nbId => {
      const nb = NM[nbId];
      if (nb.a < 0.04) return;

      const isParent = dep[nbId] < d;
      ctx.save();
      ctx.globalAlpha = nb.a * (isParent ? 0.5 : 0.32);
      ctx.strokeStyle = isParent ? '#3a7fcc' : '#1e5090';
      ctx.lineWidth   = isParent ? 1.1 : 0.75;

      // Slight lateral curve for visual warmth
      const mx = (an.x + nb.x) / 2;
      const my = (an.y + nb.y) / 2;
      const bx = (nb.x - an.x) * 0.1;

      ctx.beginPath();
      ctx.moveTo(an.x, an.y);
      ctx.quadraticCurveTo(mx + bx, my, nb.x, nb.y);
      ctx.stroke();
      ctx.restore();
    });
  }

  function drawNodes() {
    // Draw in size order so smaller nodes render on top of larger ones' edges
    const sorted = [...NODES].sort((a, b) => nodeR(NM[b.id]) - nodeR(NM[a.id]));
    sorted.forEach(({ id }) => {
      const n = NM[id];
      if (n.a < 0.02) return;
      drawNode(n);
    });
  }

  const FILLS   = { hub: '#0e2a58', cat: '#0a1e40', sub: '#091830', post: '#08142a' };
  const BORDERS = { hub: '#1460c8', cat: '#174a90', sub: '#153870', post: '#102c58' };

  function drawNode(n) {
    const r        = nodeR(n);
    const isActive = n.id === activeId;
    const isHover  = n.id === hoverId;

    ctx.save();
    ctx.globalAlpha = n.a;

    // Glow
    if (isActive) {
      ctx.shadowColor = '#0f62fe';
      ctx.shadowBlur  = 18 + Math.sin(pulse) * 5;
    } else if (isHover) {
      ctx.shadowColor = '#2455a0';
      ctx.shadowBlur  = 9;
    }

    // Circle fill
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = isActive ? '#0f2d60' : FILLS[n.type] || '#091830';
    ctx.fill();

    // Border
    ctx.strokeStyle = isActive ? '#1a6dff' : (isHover ? '#2a60b0' : BORDERS[n.type] || '#153870');
    ctx.lineWidth   = isActive ? 1.5 : 0.8;
    ctx.stroke();

    ctx.restore();

    // Label
    ctx.save();
    ctx.globalAlpha  = n.a;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = isActive ? '#d8eaff' : (isHover ? '#7aaedc' : '#3d5a78');

    if (r >= 20) {
      // Wrap label inside circle
      const font  = isActive ? 'bold 11px Inter, system-ui, sans-serif' : '10px Inter, system-ui, sans-serif';
      const lines = wrapText(n.label, r * 1.72, font);
      ctx.font = font;
      const lineH  = isActive ? 14 : 12;
      const startY = n.y - ((lines.length - 1) * lineH) / 2;
      lines.forEach((line, i) => ctx.fillText(line, n.x, startY + i * lineH));
    } else {
      // Label below small node — show full label on hover
      ctx.font = '10px Inter, system-ui, sans-serif';
      const text = (isHover || isActive) ? n.label : clip(n.label, 90);
      ctx.fillText(text, n.x, n.y + r + 12);
    }

    ctx.restore();
  }

  // ── TEXT HELPERS ────────────────────────────────────────────────────────────

  function wrapText(text, maxW, font) {
    ctx.font = font;
    const words = text.split(' ');
    const lines = [];
    let cur = '';
    words.forEach(w => {
      const test = cur ? cur + ' ' + w : w;
      if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
      else cur = test;
    });
    if (cur) lines.push(cur);
    return lines.slice(0, 3);
  }

  function clip(text, maxW) {
    ctx.font = '10px Inter, system-ui, sans-serif';
    if (ctx.measureText(text).width <= maxW) return text;
    let t = text;
    while (t.length > 2 && ctx.measureText(t + '…').width > maxW) t = t.slice(0, -1);
    return t + '…';
  }

  // ── HIT TEST ────────────────────────────────────────────────────────────────

  function hitTest(x, y) {
    const sorted = [...NODES].sort((a, b) => nodeR(NM[a.id]) - nodeR(NM[b.id]));
    for (const { id } of sorted) {
      const n = NM[id];
      if (n.a < 0.15) continue;
      const r = nodeR(n) + 10;
      if ((x - n.x) ** 2 + (y - n.y) ** 2 <= r * r) return id;
    }
    return null;
  }

  // ── INTERACTION ─────────────────────────────────────────────────────────────

  const infoEl = document.getElementById('node-info');

  function handleHover(x, y) {
    const id = hitTest(x, y);
    if (id !== hoverId) {
      hoverId = id;
      canvas.style.cursor = id ? 'pointer' : 'default';
      if (id && id !== activeId) {
        infoEl.textContent = NM[id].label;
        infoEl.classList.add('visible');
      } else {
        infoEl.classList.remove('visible');
      }
    }
  }

  function handleClick(x, y) {
    const id = hitTest(x, y);
    if (!id) return;
    if (id === activeId) {
      if (NM[id].url) window.location.href = NM[id].url;
      return;
    }
    activeId = id;
    hoverId  = null;
    infoEl.classList.remove('visible');
    doLayout(id);
  }

  canvas.addEventListener('mousemove', e => handleHover(e.clientX, e.clientY));
  canvas.addEventListener('mouseleave', () => {
    hoverId = null;
    canvas.style.cursor = 'default';
    infoEl.classList.remove('visible');
  });
  canvas.addEventListener('click', e => handleClick(e.clientX, e.clientY));

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    handleClick(t.clientX, t.clientY);
  }, { passive: false });

  // ── LOOP ────────────────────────────────────────────────────────────────────

  function loop() { update(); draw(); requestAnimationFrame(loop); }

  // Init: nodes clustered at centre, bloom outward on load
  const TAU = Math.PI * 2;
  NODES.forEach(({ id }, i) => {
    const a = (i / NODES.length) * TAU;
    NM[id].x = W / 2 + Math.cos(a) * 18;
    NM[id].y = H / 2 + Math.sin(a) * 18;
  });

  doLayout('home');
  loop();

})();
</script>

</body>
</html>
